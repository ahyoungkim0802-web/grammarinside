<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LE ACADEMY SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div id="login-box" class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-sm text-center">
        <h1 id="h-name" class="text-3xl font-black mb-2">LE 영어학원</h1>
        <p class="text-blue-600 font-bold text-xs mb-8 uppercase tracking-widest">LMS Gateway</p>
        
        <input id="uid" type="text" placeholder="아이디 (admin)" class="w-full p-3 mb-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
        <input id="upw" type="password" placeholder="비밀번호 (1234)" class="w-full p-3 mb-6 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
        
        <button onclick="goAdmin()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold hover:bg-blue-700 transition">시스템 접속</button>
    </div>

    <div id="admin-box" class="hidden bg-white p-8 rounded-3xl shadow-2xl w-full max-w-2xl">
        <div class="flex justify-between items-center mb-8 border-b pb-4">
            <h2 class="text-xl font-black">ADMIN DASHBOARD</h2>
            <button onclick="location.reload()" class="text-gray-400 text-sm">로그아웃</button>
        </div>
        
        <div class="grid grid-cols-2 gap-6">
            <div class="space-y-4">
                <p class="font-bold text-blue-600 text-sm italic">학원 운영 설정</p>
                <input id="new-name" type="text" placeholder="학원 이름 변경" class="w-full p-2 border-b" oninput="document.getElementById('h-name').innerText=this.value">
                <input type="number" placeholder="커트라인 (80)" class="w-full p-2 border-b">
                <button class="w-full bg-blue-100 text-blue-700 p-2 rounded-lg font-bold text-sm">설정 저장</button>
            </div>
            <div class="space-y-4 bg-gray-50 p-4 rounded-xl">
                <p class="font-bold text-green-600 text-sm italic">교재 PDF 업로드</p>
                <input type="file" class="text-xs">
                <p class="text-[10px] text-gray-400">PDF를 올리면 AI가 20문제를 자동 생성합니다.</p>
            </div>
        </div>
    </div>

    <script>
        function goAdmin() {
            const id = document.getElementById('uid').value;
            const pw = document.getElementById('upw').value;
            if(id === 'admin' && pw === '1234') {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('admin-box').style.display = 'block';
            } else {
                alert("아이디: admin / 비번: 1234 를 입력하세요.");
            }
        }
    </script>
</body>
</html>
