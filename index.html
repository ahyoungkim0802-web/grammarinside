<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LE LMS | 관리자 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        // Firebase SDK 로드
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 1. 원장님이 보내주신 설정값 적용
        const firebaseConfig = {
            apiKey: "AIzaSyAb1ntJhctRZBJ2j2Qn5AVsMayCShhzVQM",
            authDomain: "afteringang.firebaseapp.com",
            projectId: "afteringang",
            storageBucket: "afteringang.firebasestorage.app",
            messagingSenderId: "1070451209936",
            appId: "1:1070451209936:web:152cbd60fed2575cf9d0d5",
            measurementId: "G-Y31BY7QDYN"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 2. 화면 로드 시 DB에서 설정 불러오기
        window.onload = async () => {
            try {
                const docRef = doc(db, "config", "settings");
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('academy-name-input').value = data.academyName || "";
                    document.getElementById('pass-score-input').value = data.passScore || 80;
                    document.getElementById('display-name').innerText = data.academyName || "EPL영어학원";
                }
            } catch (e) {
                console.log("초기 데이터가 없습니다.");
            }
        };

        // 3. 설정 저장 함수 (DB 전송)
        window.saveSettings = async () => {
            const name = document.getElementById('academy-name-input').value;
            const score = document.getElementById('pass-score-input').value;
            const btn = document.getElementById('save-btn');

            if(!name) return alert("학원이름을 입력해주세요.");

            try {
                btn.innerText = "저장 중...";
                btn.disabled = true;
                
                await setDoc(doc(db, "config", "settings"), {
                    academyName: name,
                    passScore: Number(score),
                    updatedAt: new Date()
                });
                
                alert("파이어베이스에 성공적으로 저장되었습니다!");
                document.getElementById('display-name').innerText = name;
            } catch (e) {
                console.error(e);
                alert("저장 실패! 파이어베이스 'Rules'에서 수정을 허용했는지 확인하세요.");
            } finally {
                btn.innerText = "설정 저장";
                btn.disabled = false;
            }
        };

        // 파일 선택 시 이름 표시용
        document.getElementById('pdf-file')?.addEventListener('change', (e) => {
            const fileName = e.target.files[0]?.name || "선택된 파일 없음";
            document.getElementById('file-name').innerText = fileName;
        });
    </script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-4xl rounded-[40px] shadow-2xl overflow-hidden border border-white">
        <div class="p-10 flex justify-between items-center border-b border-slate-50">
            <div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tighter uppercase">Admin Dashboard</h1>
                <p id="display-name" class="text-blue-600 font-bold text-sm italic">Loading...</p>
            </div>
            <button onclick="location.reload()" class="text-slate-400 font-bold hover:text-slate-600 transition">로그아웃</button>
        </div>

        <div class="p-10 grid md:grid-cols-2 gap-12">
            <div class="space-y-8">
                <h2 class="text-slate-800 font-bold text-lg flex items-center gap-2">
                    <span class="w-2 h-6 bg-blue-600 rounded-full"></span> 운영 설정
                </h2>
                <div class="space-y-6">
                    <div class="bg-slate-50 p-4 rounded-2xl border border-transparent focus-within:border-blue-500 transition">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">학원 이름</label>
                        <input id="academy-name-input" type="text" class="w-full bg-transparent text-xl font-bold outline-none" placeholder="EPL영어학원">
                    </div>
                    <div class="bg-slate-50 p-4 rounded-2xl border border-transparent focus-within:border-blue-500 transition">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">합격 커트라인 (점)</label>
                        <input id="pass-score-input" type="number" class="w-full bg-transparent text-xl font-bold outline-none" placeholder="80">
                    </div>
                    <button id="save-btn" onclick="saveSettings()" class="w-full bg-blue-600 text-white hover:bg-blue-700 transition-all py-4 rounded-2xl font-black text-lg shadow-xl shadow-blue-100">
                        설정 저장
                    </button>
                </div>
            </div>

            <div class="bg-slate-50 rounded-[32px] p-8 border border-slate-100 space-y-6">
                <h2 class="text-slate-800 font-bold text-lg flex items-center gap-2">
                    <span class="w-2 h-6 bg-emerald-500 rounded-full"></span> 교재 관리
                </h2>
                <div class="bg-white border-2 border-dashed border-slate-200 rounded-2xl p-8 text-center space-y-4">
                    <input type="file" id="pdf-file" class="hidden" accept="application/pdf">
                    <label for="pdf-file" class="inline-block bg-slate-900 text-white px-6 py-2 rounded-xl font-bold text-sm cursor-pointer hover:bg-slate-800 transition">
                        PDF 파일 선택
                    </label>
                    <p id="file-name" class="text-xs text-slate-400 font-medium truncate px-4">리딩튜터 스타터 1 - S01.1.pdf</p>
                </div>
                <div class="space-y-3">
                    <p class="text-[11px] text-slate-400 leading-relaxed font-semibold">
                        * PDF 업로드 시 AI가 지문을 분석하여<br>자동으로 20문제를 생성합니다.
                    </p>
                    <button onclick="alert('AI 연동 준비 중입니다.')" class="w-full bg-emerald-500 text-white py-4 rounded-2xl font-black text-lg shadow-lg shadow-emerald-100">
                        AI 문제 생성
                    </button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
