<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LE LMS | Smart Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>

    <div id="view-login" class="max-w-md mx-auto min-h-screen flex flex-col justify-center p-8 space-y-12">
        <div class="text-center space-y-2">
            <h1 id="display-academy-name" class="text-4xl font-black text-slate-900 tracking-tight leading-tight">LE 영어학원</h1>
            <p class="text-indigo-600 font-bold tracking-[0.2em] text-sm uppercase">LE System Gateway</p>
        </div>

        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl border border-white space-y-6">
            <div class="space-y-4">
                <input id="input-id" type="text" class="w-full bg-slate-50 p-4 rounded-2xl outline-none border border-transparent focus:border-indigo-500 transition" placeholder="아이디 (admin)">
                <input id="input-pw" type="password" class="w-full bg-slate-50 p-4 rounded-2xl outline-none border border-transparent focus:border-indigo-500 transition" placeholder="비밀번호 (1234)">
            </div>
            <button onclick="handleLogin()" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold shadow-xl shadow-indigo-100 active:scale-95 transition-all">
                시스템 접속
            </button>
        </div>
        
        <div class="text-center space-y-4 text-slate-400 text-[10px] font-bold uppercase tracking-widest">
            © 2026 LE Academy Technology • V1.0.3 Stable
        </div>
    </div>

    <div id="view-admin" class="hidden max-w-4xl mx-auto p-4 md:p-8 space-y-6">
        <div class="flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <div>
                <h2 class="text-2xl font-black text-slate-800 tracking-tighter">ADMIN DASHBOARD</h2>
                <p class="text-sm text-slate-400 font-bold">시스템 설정 및 교재 관리</p>
            </div>
            <button onclick="location.reload()" class="bg-slate-100 text-slate-500 px-4 py-2 rounded-xl text-sm font-bold hover:bg-slate-200">로그아웃</button>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <div class="bg-white p-8 rounded-3xl shadow-xl space-y-6">
                <h3 class="font-bold text-indigo-600 uppercase text-xs tracking-widest">학원 운영 설정</h3>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 ml-1 uppercase">학원 이름</label>
                        <input id="set-name" type="text" class="w-full bg-slate-50 p-3 rounded-xl border border-transparent focus:border-indigo-500 outline-none" value="LE 영어학원" oninput="updateAcademyName(this.value)">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 ml-1 uppercase">커트라인 (점)</label>
                            <input id="set-score" type="number" class="w-full bg-slate-50 p-3 rounded-xl border border-transparent focus:border-indigo-500 outline-none" value="80">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 ml-1 uppercase">출제 문제수</label>
                            <input id="set-count" type="number" class="w-full bg-slate-50 p-3 rounded-xl border border-transparent focus:border-indigo-500 outline-none" value="20">
                        </div>
                    </div>
                    <button onclick="alert('데이터베이스 연동 전입니다. 화면상에 임시 적용됩니다.')" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold shadow-lg">설정값 적용</button>
                </div>
            </div>

            <div class="bg-white p-8 rounded-3xl shadow-xl space-y-6">
                <h3 class="font-bold text-emerald-600 uppercase text-xs tracking-widest">교재 및 문제 관리</h3>
                <div class="border-2 border-dashed border-slate-200 rounded-2xl p-10 text-center space-y-4">
                    <p class="text-sm text-slate-400">PDF 파일을 선택하세요.</p>
                    <input type="file" id="pdf-file" class="hidden">
                    <label for="pdf-file" class="inline-block bg-emerald-500 text-white px-6 py-2 rounded-full text-sm font-bold cursor-pointer hover:bg-emerald-600 transition">파일 업로드</label>
                </div>
                <div class="bg-slate-50 p-4 rounded-xl text-[10px] text-slate-400 leading-relaxed font-bold">
                    * PDF 업로드 시 AI가 지문을 분석하여 자동으로 문제를 생성합니다.
                </div>
            </div>
        </div>
    </div>

    <script>
        // 로그인 처리 함수
        function handleLogin() {
            const id = document.getElementById('input-id').value;
            const pw = document.getElementById('input-pw').value;

            if (id === 'admin' && pw === '1234') {
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-admin').classList.remove('hidden');
            } else if (id && pw) {
                alert('학생 페이지는 현재 준비 중입니다. admin / 1234로 로그인하세요.');
            } else {
                alert('아이디와 비밀번호를 입력해주세요.');
            }
        }

        // 학원 이름 실시간 업데이트
        function updateAcademyName(val) {
            document.getElementById('display-academy-name').innerText = val || "학원이름";
        }
    </script>
</body>
</html>
