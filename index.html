<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LE LMS - Smart Gateway</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 1. 여기에 원장님의 파이어베이스 설정값을 붙여넣으세요!
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // React 컴포넌트 시작
        const { useState, useEffect } = React;

        const LESystem = () => {
            const [view, setView] = useState('login'); // login, admin, student, quiz
            const [settings, setSettings] = useState({ academyName: 'LE 영어학원', passScore: 80, qCount: 20 });
            const [login, setLogin] = useState({ id: '', pw: '' });
            const [loading, setLoading] = useState(false);

            // 초기 설정 로드
            useEffect(() => {
                const loadSettings = async () => {
                    const docRef = doc(db, "config", "settings");
                    const snap = await getDoc(docRef);
                    if (snap.exists()) setSettings(snap.data());
                };
                loadSettings();
            }, []);

            const handleLogin = () => {
                if (login.id === 'admin' && login.pw === '1234') setView('admin');
                else if (login.id && login.pw) setView('student');
                else alert("아이디와 비밀번호를 입력하세요.");
            };

            const saveSettings = async () => {
                setLoading(true);
                await setDoc(doc(db, "config", "settings"), settings);
                setLoading(false);
                alert("설정이 저장되었습니다!");
            };

            // --- 관리자 화면 ---
            if (view === 'admin') return (
                <div class="max-w-md mx-auto p-6 space-y-6">
                    <header class="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm">
                        <h1 class="font-bold text-indigo-600">관리자 모드</h1>
                        <button onClick={() => setView('login')} class="text-xs text-gray-400">로그아웃</button>
                    </header>
                    <div class="bg-white p-6 rounded-2xl shadow-lg space-y-4 font-bold">
                        <div>
                            <label class="text-xs text-gray-400">학원 이름</label>
                            <input class="w-full border-b-2 p-2 outline-none focus:border-indigo-500" value={settings.academyName} onChange={e => setSettings({...settings, academyName: e.target.value})} />
                        </div>
                        <div class="flex gap-4">
                            <div class="flex-1">
                                <label class="text-xs text-gray-400">커트라인 (점)</label>
                                <input type="number" class="w-full border-b-2 p-2 outline-none" value={settings.passScore} onChange={e => setSettings({...settings, passScore: e.target.value})} />
                            </div>
                            <div class="flex-1">
                                <label class="text-xs text-gray-400">문제 수</label>
                                <input type="number" class="w-full border-b-2 p-2 outline-none" value={settings.qCount} onChange={e => setSettings({...settings, qCount: e.target.value})} />
                            </div>
                        </div>
                        <button onClick={saveSettings} class="w-full bg-indigo-600 text-white p-4 rounded-xl shadow-lg">{loading ? '저장중...' : '설정 저장하기'}</button>
                    </div>
                </div>
            );

            // --- 로그인 화면 ---
            return (
                <div class="max-w-md mx-auto min-h-screen flex flex-col justify-center p-8 space-y-10">
                    <h1 class="text-4xl font-black text-center text-slate-800 leading-tight">
                        {settings.academyName}<br/><span class="text-indigo-600 text-2xl font-bold italic tracking-tighter">LE SYSTEM</span>
                    </h1>
                    <div class="space-y-4 bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
                        <input class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-400 transition" placeholder="아이디" onChange={e => setLogin({...login, id: e.target.value})} />
                        <input class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-400 transition" type="password" placeholder="비밀번호" onChange={e => setLogin({...login, pw: e.target.value})} />
                        <button onClick={handleLogin} class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold shadow-indigo-200 shadow-xl active:scale-95 transition">시스템 접속</button>
                    </div>
                    <p class="text-center text-[10px] text-slate-400 uppercase tracking-widest">Powered by LE Academy Logic</p>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LESystem />);
    </script>
</body>
</html>
