<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LE LMS | Smart Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .view-step { display: none; }
        .view-step.active { display: block; }
    </style>
</head>
<body>

<div id="app" class="max-w-4xl mx-auto min-h-screen p-4 flex flex-col justify-center text-center">

    <div id="view-login" class="view-step active max-w-sm mx-auto w-full space-y-8">
        <h1 class="text-4xl font-black italic tracking-tighter">LE 영어학원</h1>
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl space-y-4">
            <input id="input-id" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border focus:border-indigo-500" placeholder="이름 (관리자: admin)">
            <input id="input-pw" type="password" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border focus:border-indigo-500" placeholder="비밀번호">
            <button onclick="handleLogin()" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-black shadow-lg">시스템 접속</button>
        </div>
    </div>

    <div id="view-admin" class="view-step w-full space-y-8">
        <div class="flex justify-between items-center"><h2 class="text-2xl font-black italic">ADMIN CONTROL</h2><button onclick="location.reload()" class="font-bold text-slate-400">LOGOUT</button></div>
        <div class="grid md:grid-cols-3 gap-8 text-left">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border-2 border-indigo-50 space-y-4">
                <h3 class="font-black text-indigo-600 text-xs tracking-widest uppercase">시험 지정 (ASSIGN)</h3>
                <input id="assign-name" class="w-full p-4 bg-slate-50 rounded-2xl outline-none" placeholder="학생 이름">
                <select id="assign-book" class="w-full p-4 bg-slate-50 rounded-2xl outline-none"><option value="grammar_inside">Grammar Inside</option></select>
                <select id="assign-unit" class="w-full p-4 bg-slate-50 rounded-2xl outline-none"><option value="1">Unit 1</option><option value="2">Unit 2</option></select>
                <button id="assign-btn" onclick="assignTask()" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-black shadow-lg">지정하기</button>
            </div>
            <div class="md:col-span-2 bg-white rounded-[2.5rem] shadow-xl overflow-hidden border">
                <div class="p-5 bg-slate-900 text-white font-bold">실시간 시험 기록</div>
                <div class="max-h-[400px] overflow-y-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-50 text-slate-400 font-bold uppercase text-[10px]"><tr><th class="p-4">이름</th><th class="p-4">교재/U</th><th class="p-4">점수</th><th class="p-4">결과</th></tr></thead>
                        <tbody id="admin-result-list"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="view-student-ready" class="view-step max-w-sm mx-auto w-full space-y-8">
        <div class="bg-white p-12 rounded-[3.5rem] shadow-2xl space-y-6">
            <div class="text-indigo-600 font-black tracking-widest bg-indigo-50 inline-block px-4 py-2 rounded-xl italic text-sm">TODAY'S TASK</div>
            <h2 id="assigned-info" class="text-2xl font-black text-slate-800 tracking-tight italic text-center">지정된 시험 없음</h2>
            <button onclick="startTest()" class="w-full bg-indigo-600 text-white p-5 rounded-2xl font-black text-xl shadow-xl">테스트 시작</button>
        </div>
    </div>

    <div id="view-quiz-running" class="view-step w-full max-w-xl mx-auto space-y-6">
        <div id="quiz-flow" class="space-y-4"></div>
        <button onclick="submitTest()" class="w-full bg-indigo-600 text-white p-6 rounded-[2rem] font-black text-xl shadow-2xl">답안 제출하기</button>
    </div>

    <div id="view-result" class="view-step max-w-sm mx-auto w-full bg-white p-12 rounded-[3rem] shadow-2xl space-y-6">
        <h2 id="res-score" class="text-7xl font-black tracking-tighter text-slate-800">0점</h2>
        <h3 id="res-status" class="text-4xl font-black uppercase tracking-widest"></h3>
        <button onclick="location.reload()" class="w-full bg-slate-100 p-4 rounded-2xl font-bold text-slate-400 mt-4 italic text-center">DONE</button>
    </div>

</div>

<script>
    // 1. 파이어베이스 초기화
    const firebaseConfig = {
        apiKey: "AIzaSyAb1ntJhctRZBJ2j2Qn5AVsMayCShhzVQM",
        authDomain: "afteringang.firebaseapp.com",
        projectId: "afteringang",
        storageBucket: "afteringang.firebasestorage.app",
        messagingSenderId: "1070451209936",
        appId: "1:1070451209936:web:152cbd60fed2575cf9d0d5"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 2. 문제 데이터
    const quizData = {
        "grammar_inside_1": [{ q: "I (am/is/are) a student.", a: "am" }, { q: "He (am/is/are) tall.", a: "is" }],
        "grammar_inside_2": [{ q: "You (am/is/are) smart.", a: "are" }, { q: "They (am/is/are) fast.", a: "are" }]
    };

    let studentName = "";
    let currentBook = "";
    let currentUnit = "";

    // 화면 전환 함수
    function showView(viewId) {
        document.querySelectorAll('.view-step').forEach(el => el.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
    }

    // 로그인
    async function handleLogin() {
        const id = document.getElementById('input-id').value.trim();
        const pw = document.getElementById('input-pw').value;
        if (id === 'admin' && pw === '1234') {
            showView('view-admin');
            loadResults();
        } else if (id) {
            studentName = id;
            const docRef = db.collection("assignments").doc(studentName);
            const docSnap = await docRef.get();
            if (docSnap.exists) {
                currentBook = docSnap.data().book;
                currentUnit = docSnap.data().unit;
                document.getElementById('assigned-info').innerText = currentBook + " - Unit " + currentUnit;
                showView('view-student-ready');
            } else { alert("지정된 시험이 없습니다."); }
        }
    }

    // 시험 지정
    async function assignTask() {
        const sName = document.getElementById('assign-name').value.trim();
        const book = document.getElementById('assign-book').value;
        const unit = document.getElementById('assign-unit').value;
        if(!sName) return alert("이름을 입력하세요.");
        await db.collection("assignments").doc(sName).set({ book, unit, time: new Date() });
        alert(sName + " 학생에게 지정 완료!");
    }

    // 시험 시작
    function startTest() {
        const questions = quizData[currentBook + "_" + currentUnit];
        document.getElementById('quiz-flow').innerHTML = questions.map((item, idx) => `
            <div class="bg-white p-6 rounded-3xl shadow-sm border mb-4 text-left">
                <p class="font-bold mb-2">Q${idx+1}. ${item.q}</p>
                <input type="text" class="student-input w-full p-4 bg-slate-50 rounded-2xl outline-none" placeholder="정답">
            </div>
        `).join('');
        showView('view-quiz-running');
    }

    // 제출
    async function submitTest() {
        const correctData = quizData[currentBook + "_" + currentUnit];
        const inputs = document.querySelectorAll('.student-input');
        let correct = 0;
        inputs.forEach((input, idx) => {
            if(input.value.trim().toLowerCase() === correctData[idx].a.toLowerCase()) correct++;
        });
        const score = Math.round((correct / correctData.length) * 100);
        const status = score >= 80 ? "PASS" : "FAIL";

        await db.collection("results").add({ name: studentName, book: currentBook, unit: currentUnit, score, status, time: new Date() });
        
        document.getElementById('res-score').innerText = score + "점";
        document.getElementById('res-status').innerText = status;
        document.getElementById('res-status').className = "text-4xl font-black " + (status === "PASS" ? "text-emerald-500" : "text-red-500");
        showView('view-result');
    }

    // 결과 로드
    function loadResults() {
        db.collection("results").orderBy("time", "desc").onSnapshot((snapshot) => {
            const list = document.getElementById('admin-result-list');
            list.innerHTML = snapshot.docs.map(doc => {
                const d = doc.data();
                return `<tr class="border-b"><td class="p-4 font-bold">${d.name}</td><td class="p-4 text-xs">${d.book}/U${d.unit}</td><td class="p-4 font-bold">${d.score}</td><td class="p-4 font-black ${d.status === "PASS" ? "text-emerald-500" : "text-red-500"}">${d.status}</td></tr>`;
            }).join('');
        });
    }
</script>

</body>
</html>
